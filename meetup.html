<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Lenovox MeetUp</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#03030b;--c1:rgba(11,11,30,.97);--c2:rgba(16,16,42,.99);--blue:#00d2ff;--gold:#ffcc33;--green:#10b981;--orange:#ff9500;--purple:#5856d6;--pink:#ff3d70;--red:#ef4444;--border:rgba(255,255,255,0.07);--tx:#e8eaf6;--mu:#8892a4}
[data-theme="light"]{--bg:#f0f4f8;--c1:rgba(255,255,255,.98);--c2:#fff;--border:rgba(0,0,0,.09);--tx:#1e293b;--mu:#64748b}
[data-theme="dim"]{--bg:#0f1117;--c1:rgba(20,22,36,.97);--c2:rgba(26,28,44,.99);--border:rgba(255,255,255,.08);--tx:#d4d8e8;--mu:#7a8499}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.shell{display:flex;flex-direction:column;height:100vh}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;padding:10px 13px 8px;gap:9px;border-bottom:1px solid var(--border);background:var(--c1);backdrop-filter:blur(20px);flex-shrink:0}
.mu-logo{font-family:system-ui,sans-serif;font-size:.95rem;font-weight:900;background:linear-gradient(90deg,#fff,#af52de);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mu-dot{width:7px;height:7px;border-radius:50%;background:#af52de;box-shadow:0 0 9px #af52de;animation:ldot 2s ease-in-out infinite;flex-shrink:0}
@keyframes ldot{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
.beta{background:rgba(255,204,51,.12);border:1px solid rgba(255,204,51,.22);color:var(--gold);padding:2px 7px;border-radius:999px;font-size:.6rem;font-weight:800}
.hdr-right{display:flex;gap:7px;align-items:center;margin-left:auto}
.online-pill{display:flex;align-items:center;gap:4px;font-size:.67rem;color:var(--green);font-weight:700}
.online-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:ldot 1.5s ease-in-out infinite}
.hic{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;position:relative}
.hic i{color:var(--mu);font-size:.8rem}
.hic:hover i{color:var(--purple)}
.hic .badge{position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:var(--red);font-size:.55rem;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bg)}

/* ── TABS ── */
.tab-bar{display:flex;border-bottom:1px solid var(--border);background:var(--c1);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tb{flex-shrink:0;padding:9px 13px;border:none;background:transparent;color:var(--mu);font-family:'Nunito',sans-serif;font-size:.74rem;font-weight:700;cursor:pointer;transition:.2s;position:relative;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tb i{font-size:.7rem}
.tb.active{color:var(--tx)}
.tb.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),#af52de);border-radius:2px 2px 0 0}
.tb .unread{background:var(--red);color:#fff;width:14px;height:14px;border-radius:50%;font-size:.55rem;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
.panel{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel.active{display:flex}

/* ── SCROLLABLE CONTENT ── */
.scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.scroll::-webkit-scrollbar{width:2px}
.scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:99px}

/* ── POLICY BAR ── */
.policy-bar{background:rgba(239,68,68,.06);border-bottom:1px solid rgba(239,68,68,.12);padding:9px 13px;display:flex;gap:8px;align-items:flex-start;flex-shrink:0}
.policy-bar i{color:var(--red);font-size:.82rem;margin-top:1px;flex-shrink:0}
.policy-bar-txt{font-size:.71rem;color:var(--tx);line-height:1.5}
.policy-bar-txt b{color:var(--red)}

/* ── STORIES ── */
.stories{display:flex;gap:9px;overflow-x:auto;padding:10px 13px;background:var(--c1);border-bottom:1px solid var(--border);flex-shrink:0;scrollbar-width:none}
.stories::-webkit-scrollbar{display:none}
.story{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.story-ring{width:52px;height:52px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--purple),#af52de,var(--pink));display:flex;align-items:center;justify-content:center}
.story-ring.seen{background:rgba(255,255,255,.12)}
.story-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:900;color:#fff;border:2px solid var(--bg);position:relative}
.story-add{width:16px;height:16px;background:var(--purple);border-radius:50%;display:flex;align-items:center;justify-content:center;position:absolute;bottom:-1px;right:-1px;border:2px solid var(--bg)}
.story-add i{font-size:.44rem;color:#fff}
.story-name{font-size:.59rem;font-weight:700;color:var(--mu);max-width:52px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── COMPOSE ── */
.compose{background:var(--c1);border-bottom:1px solid var(--border);padding:9px 13px;display:flex;align-items:center;gap:9px;flex-shrink:0}
.compose-av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:900;color:#fff;flex-shrink:0}
.compose-btn{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:22px;padding:8px 13px;font-family:'Nunito',sans-serif;font-size:.82rem;color:var(--mu);cursor:pointer;text-align:left;transition:.2s;font-weight:600}
.compose-btn:hover{border-color:rgba(88,86,214,.3)}
.compose-tools{display:flex;gap:5px}
.ct{width:29px;height:29px;border-radius:8px;background:none;border:1px solid var(--border);color:var(--mu);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.76rem;transition:.2s}
.ct:hover{border-color:rgba(88,86,214,.3);color:var(--purple)}

/* ── POST CARD ── */
.post{background:var(--c1);border-bottom:1px solid var(--border)}
.post-hdr{display:flex;align-items:center;gap:9px;padding:11px 13px 7px}
.post-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:.84rem;font-weight:900;color:#fff;flex-shrink:0}
.post-info{flex:1;min-width:0}
.post-name{font-size:.82rem;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.post-name .ver{color:var(--blue);font-size:.64rem}
.ptag{padding:1px 6px;border-radius:5px;font-size:.57rem;font-weight:800}
.pt-elite{background:rgba(255,204,51,.1);border:1px solid rgba(255,204,51,.2);color:var(--gold)}
.pt-pro{background:rgba(157,80,187,.1);border:1px solid rgba(157,80,187,.2);color:#c084fc}
.pt-std{background:rgba(0,210,255,.1);border:1px solid rgba(0,210,255,.18);color:var(--blue)}
.post-time{font-size:.64rem;color:var(--mu);margin-top:1px}
.post-more{width:27px;height:27px;border-radius:7px;background:none;border:none;color:var(--mu);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.78rem;transition:.17s}
.post-more:hover{background:rgba(255,255,255,.06);color:var(--tx)}
.post-body{padding:0 13px 9px;font-size:.84rem;line-height:1.7;color:var(--tx);word-break:break-word}
.post-body .htag{color:var(--purple);font-weight:700;cursor:pointer}
.post-media{width:100%;max-height:300px;object-fit:cover;display:block;background:#111}
.post-video{width:100%;max-height:300px;object-fit:contain;background:#000;display:block}
.post-actions{display:flex;border-top:1px solid var(--border);padding:3px 8px}
.pa{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 4px;border:none;background:none;color:var(--mu);font-family:'Nunito',sans-serif;font-size:.74rem;font-weight:700;cursor:pointer;border-radius:9px;transition:.17s}
.pa i{font-size:.78rem}
.pa:hover{background:rgba(255,255,255,.04);color:var(--tx)}
.pa.liked{color:var(--pink)}.pa.liked i{color:var(--pink)}
.pa.num{min-width:0}

/* ── AI ANALYSIS CARD (on post) ── */
.ai-analysis{margin:0 13px 10px;background:rgba(0,210,255,.06);border:1px solid rgba(0,210,255,.14);border-radius:12px;padding:10px 12px;font-size:.76rem;color:var(--tx);line-height:1.6}
.ai-analysis .ai-hdr{display:flex;align-items:center;gap:6px;font-weight:800;margin-bottom:5px;font-size:.74rem;color:var(--blue)}
.ai-analysis .ai-hdr i{font-size:.7rem}

/* ── REELS ── */
.reels-scroll{flex:1;overflow-y:auto;scroll-snap-type:y mandatory;scrollbar-width:none}
.reels-scroll::-webkit-scrollbar{display:none}
.reel{height:100%;min-height:100%;scroll-snap-align:start;position:relative;background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer}
.reel-vid{width:100%;height:100%;object-fit:cover}
.reel-overlay{position:absolute;inset:0;pointer-events:none}
.reel-right{position:absolute;right:11px;bottom:90px;display:flex;flex-direction:column;gap:14px;pointer-events:all;align-items:center}
.ra{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer}
.ra-ic{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:1rem;color:#fff;backdrop-filter:blur(8px);transition:.2s}
.ra-ic:hover{background:rgba(255,255,255,.15)}
.ra span{font-size:.62rem;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.7)}
.ra.liked .ra-ic{background:rgba(255,61,112,.25);border-color:rgba(255,61,112,.5);color:var(--pink)}
.reel-bottom{position:absolute;left:0;right:56px;bottom:0;padding:12px 13px 18px;background:linear-gradient(transparent,rgba(0,0,0,.8))}
.reel-user{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.reel-user-av{width:33px;height:33px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:900;color:#fff}
.reel-uname{font-weight:800;font-size:.82rem;color:#fff}
.reel-follow{padding:3px 10px;border:1.5px solid #fff;border-radius:999px;background:transparent;color:#fff;font-family:'Nunito',sans-serif;font-size:.7rem;font-weight:800;cursor:pointer;margin-left:6px;transition:.2s}
.reel-caption{font-size:.79rem;color:rgba(255,255,255,.9);line-height:1.55;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.reel-audio{font-size:.68rem;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:4px}
.reel-audio i{animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.reel-pause-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.reel-pause-ov i{font-size:3rem;color:rgba(255,255,255,.7);opacity:0;transition:.2s}
.reel.paused .reel-pause-ov i{opacity:1}
.reel-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:80px;background:linear-gradient(180deg,#0d0230,#1a0545)}
.rp-icon{font-size:3rem;color:rgba(255,255,255,.1);margin-bottom:14px}
.rp-title{font-size:.86rem;font-weight:700;color:rgba(255,255,255,.45);margin-bottom:6px}
.rp-sub{font-size:.74rem;color:rgba(255,255,255,.28);text-align:center;padding:0 24px;line-height:1.6}
.rp-box{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:9px 13px;margin-top:12px;font-size:.73rem;color:rgba(255,255,255,.5);line-height:1.6;text-align:left;max-width:280px}
.rp-box b{color:#af52de}

/* ── DMs ── */
.dms-scroll{flex:1;overflow-y:auto}
.dms-scroll::-webkit-scrollbar{width:2px}
.dm-item{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:.17s}
.dm-item:hover{background:rgba(255,255,255,.03)}
.dm-av{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:.88rem;font-weight:900;color:#fff;flex-shrink:0;position:relative}
.dm-online{width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--bg);position:absolute;bottom:-1px;right:-1px}
.dm-info{flex:1;min-width:0}
.dm-name{font-size:.83rem;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:5px;margin-bottom:2px}
.dm-last{font-size:.71rem;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dm-right{text-align:right;flex-shrink:0}
.dm-time{font-size:.62rem;color:var(--mu);margin-bottom:3px}
.dm-unread{width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--purple),#af52de);display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;color:#fff;margin-left:auto}
.dm-compose{padding:9px 13px;border-bottom:1px solid var(--border);background:var(--c1);display:flex;align-items:center;gap:8px;flex-shrink:0}
.dm-search{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:7px 11px;color:var(--tx);font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:600;outline:none;-webkit-appearance:none}
.dm-search::placeholder{color:var(--mu)}

/* ── DM CHAT ── */
.dm-chat{position:fixed;inset:0;z-index:500;background:var(--bg);display:none;flex-direction:column}
.dm-chat.show{display:flex}
.dmc-hdr{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--border);background:var(--c1);flex-shrink:0}
.dmc-back{width:30px;height:30px;border-radius:8px;background:none;border:none;color:var(--mu);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.82rem}
.dmc-back:hover{background:rgba(255,255,255,.06);color:var(--tx)}
.dmc-av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:900;color:#fff;flex-shrink:0}
.dmc-info{flex:1}
.dmc-name{font-size:.84rem;font-weight:800;color:var(--tx)}
.dmc-status{font-size:.64rem;color:var(--green)}
.dmc-actions{display:flex;gap:6px}
.dmc-msgs{flex:1;overflow-y:auto;padding:12px 13px;display:flex;flex-direction:column;gap:7px}
.dmc-msgs::-webkit-scrollbar{width:2px}
.msg-bubble{max-width:75%;padding:9px 12px;border-radius:14px;font-size:.83rem;line-height:1.6;word-break:break-word}
.msg-bubble.sent{background:linear-gradient(135deg,var(--purple),#af52de);color:#fff;border-radius:14px 14px 4px 14px;align-self:flex-end}
.msg-bubble.recv{background:var(--c1);border:1px solid var(--border);color:var(--tx);border-radius:14px 14px 14px 4px;align-self:flex-start}
.msg-time-label{font-size:.6rem;color:var(--mu);text-align:center;margin:4px 0}
.ai-reply-btn{align-self:flex-start;display:flex;align-items:center;gap:5px;padding:5px 11px;background:rgba(0,210,255,.08);border:1px solid rgba(0,210,255,.18);border-radius:9px;font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:700;color:var(--blue);cursor:pointer;transition:.2s}
.ai-reply-btn:hover{background:rgba(0,210,255,.14)}
.dmc-input{display:flex;gap:7px;padding:8px 11px;background:var(--c1);border-top:1px solid var(--border);flex-shrink:0;align-items:flex-end}
.dmc-ta{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;padding:8px 11px;color:var(--tx);font-family:'Nunito',sans-serif;font-size:.84rem;font-weight:600;resize:none;outline:none;max-height:90px;line-height:1.5;transition:.2s;-webkit-appearance:none}
.dmc-ta::placeholder{color:var(--mu)}
.dmc-ta:focus{border-color:rgba(88,86,214,.4)}
.dmc-send{width:33px;height:33px;border-radius:9px;border:none;background:linear-gradient(135deg,var(--purple),#af52de);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.86rem;transition:.2s;flex-shrink:0}
.dmc-send:hover{transform:scale(1.07)}

/* ── EXPLORE ── */
.explore-scroll{flex:1;overflow-y:auto;padding:12px 13px}
.explore-scroll::-webkit-scrollbar{width:2px}
.sec-lbl{font-size:.66rem;font-weight:800;color:rgba(255,255,255,.32);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:5px;margin-bottom:9px}
[data-theme="light"] .sec-lbl{color:rgba(0,0,0,.28)}
.sec-lbl i{font-size:.63rem;color:var(--purple)}
.trends{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
.trend{padding:5px 12px;background:rgba(88,86,214,.1);border:1px solid rgba(88,86,214,.2);border-radius:999px;font-size:.74rem;font-weight:700;color:#af52de;cursor:pointer;transition:.2s}
.trend:hover{background:rgba(88,86,214,.18)}
.sug-item{display:flex;align-items:center;gap:10px;background:var(--c1);border:1px solid var(--border);border-radius:13px;padding:10px 12px;margin-bottom:8px}
.sug-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:.84rem;font-weight:900;color:#fff;flex-shrink:0}
.sug-info{flex:1;min-width:0}
.sug-name{font-size:.81rem;font-weight:800;color:var(--tx);margin-bottom:1px;display:flex;align-items:center;gap:5px}
.sug-bio{font-size:.69rem;color:var(--mu);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.follow-btn{padding:6px 13px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--purple),#af52de);color:#fff;font-family:'Nunito',sans-serif;font-size:.73rem;font-weight:800;cursor:pointer;transition:.2s;flex-shrink:0}
.follow-btn:hover{transform:translateY(-2px)}
.follow-btn.following{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--mu)}

/* ── COMPOSE MODAL ── */
.cm-ov{position:fixed;inset:0;z-index:9999;background:rgba(3,3,11,.88);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center}
.cm-ov.show{display:flex}
.cm-box{background:var(--c2);border:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-width:540px;padding:18px 14px 32px;animation:cmIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes cmIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cm-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cm-title{font-size:.85rem;font-weight:800;color:var(--tx)}
.cm-close{width:27px;height:27px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer}
.cm-close i{color:var(--mu);font-size:.76rem}
.cm-ta{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:11px;padding:10px 12px;color:var(--tx);font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:600;outline:none;resize:none;min-height:85px;line-height:1.6;transition:.22s;-webkit-appearance:none}
.cm-ta::placeholder{color:rgba(136,146,164,.38)}
.cm-ta:focus{border-color:rgba(88,86,214,.45)}
.cm-media-row{display:flex;gap:7px;margin:9px 0;flex-wrap:wrap}
.cm-mbtn{display:flex;align-items:center;gap:5px;padding:7px 11px;border:1px solid var(--border);border-radius:9px;background:rgba(255,255,255,.04);color:var(--mu);font-family:'Nunito',sans-serif;font-size:.73rem;font-weight:700;cursor:pointer;transition:.2s}
.cm-mbtn i{font-size:.74rem}
.cm-mbtn:hover{border-color:rgba(88,86,214,.3);color:var(--purple)}
.cm-prev{width:100%;border-radius:10px;overflow:hidden;margin-bottom:8px;display:none}
.cm-prev img,.cm-prev video{width:100%;max-height:200px;object-fit:cover;display:block}
.cm-footer{display:flex;align-items:center;justify-content:space-between;margin-top:11px}
.cm-char{font-size:.67rem;color:var(--mu)}

window.toggleLike=(id,idx,btn)=>{

};

  try{
    const r=await fetch('/api/getData',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      messages:[{role:'user',content:`Briefly analyse this social media post from a student: "${text}"\n\nProvide: 1) Main topic 2) Key insight or tip 3) Is this educational? Keep it under 3 sentences.`}],
      model:'fast',
      systemPrompt:'You are Lenovox AI analysing student posts. Be brief, helpful and educational.',
      uid:_uid||'guest'
    })});
    const data=await r.json();
    container.innerHTML=`<div class="ai-analysis"><div class="ai-hdr"><i class="fas fa-robot"></i> AI Analysis</div><div>${data.content||'Could not analyse.'}</div></div>`;
  }catch{container.innerHTML=`<div class="ai-analysis"><div class="ai-hdr"><i class="fas fa-robot"></i> Analysis failed</div></div>`;}
};

// ── OPTIONS + REPORT ──────────────────────────────────────────
window.openOpts=(pid,uid)=>{_curPost=pid;_curUser=uid;document.getElementById('optsOv').classList.add('show');};
window.closeOpts=()=>document.getElementById('optsOv').classList.remove('show');
window.copyPostLink=()=>{navigator.clipboard.writeText(location.href+'?p='+_curPost);toast('Link copied!','info');closeOpts();};
window.sharePostAction=()=>{if(navigator.share)navigator.share({title:'MeetUp post',url:location.href});closeOpts();};
window.blockUserAction=()=>{if(!_curUser){closeOpts();return;}_blocked.add(_curUser);localStorage.setItem('lnx_blocked',JSON.stringify([..._blocked]));_posts=_posts.filter(p=>p.authorId!==_curUser);renderPosts([]);toast('User blocked.','info');closeOpts();};
window.openReport=()=>{closeOpts();document.getElementById('repOv').classList.add('show');};
window.closeReport=()=>document.getElementById('repOv').classList.remove('show');
window.sendReport=reason=>{toast(`Reported: "${reason}". Team reviews within 24h.`,'success');closeReport();};

// ── COMPOSE ───────────────────────────────────────────────────
window.openCm=()=>document.getElementById('cmOv').classList.add('show');
window.closeCm=()=>{document.getElementById('cmOv').classList.remove('show');_mediaFile=null;_mediaType=null;document.getElementById('cmPrev').style.display='none';document.getElementById('cmPrev').innerHTML='';};
window.insertTag=()=>{const ta=document.getElementById('cmTa');ta.value+=' #';ta.focus();};
window.trigFile=t=>{document.getElementById(t==='img'?'imgFile':'vidFile').click();};
window.prevMedia=(inp,type)=>{
  const f=inp.files[0];if(!f)return;
  if(f.size>100*1024*1024){toast('Max 100MB','error');return;}
  if(BANNED_WORDS.some(w=>f.name.toLowerCase().includes(w))){toast('File rejected by content filter.','error');return;}
  _mediaFile=f;_mediaType=type;
  const url=URL.createObjectURL(f);
  const prev=document.getElementById('cmPrev');
  prev.innerHTML=type==='image'?`<img src="${url}" style="width:100%;border-radius:10px;max-height:180px;object-fit:cover">`:`<video src="${url}" controls style="width:100%;border-radius:10px;max-height:180px" playsinline></video>`;
  prev.style.display='block';openCm();
  inp.value='';
};
window.submitPost=async()=>{
  const text=document.getElementById('cmTa').value.trim();
  if(!text&&!_mediaFile){toast('Write something first!','error');return;}
  if(!_uid){toast('Sign in first.','error');return;}
  if(BANNED_WORDS.some(w=>text.toLowerCase().includes(w))){toast('Post violates guidelines. Explicit content is prohibited.','error');return;}
  const btn=document.getElementById('cmPostBtn');btn.innerHTML='<div class="spinner"></div>';btn.disabled=true;
  let mediaUrl=null,mediaType=null;
  if(_mediaFile){
    try{
      const ext=_mediaFile.name.split('.').pop();
      const path=`${_uid}/${Date.now()}.${ext}`;
      const r=await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`,{method:'POST',headers:{'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':_mediaFile.type,'x-upsert':'true'},body:_mediaFile});
      if(r.ok){mediaUrl=`${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${path}`;mediaType=_mediaType;}
      else toast('Media upload failed — posting text only.','info');
    }catch{toast('Media upload failed — posting text only.','info');}
  }
  const newPost={id:'new-'+Date.now(),authorId:_uid,authorName:_uname,plan:_uplan,verified:false,content:text,mediaUrl,mediaType,likes:0,comments:0,createdAt:{toMillis:()=>Date.now()}};
  _posts.unshift(newPost);renderPosts([]);
  toast('Posted! ✓','success');closeCm();document.getElementById('cmTa').value='';document.getElementById('cmCc').textContent='0';
  try{
    await addDoc(collection(db,'posts'),{authorId:_uid,authorName:_uname,plan:_uplan,content:text,mediaUrl,mediaType,likes:0,comments:0,likedBy:[],reported:false,country:'NG',createdAt:serverTimestamp()});
  }catch(e){console.error('Post save failed',e);}
  btn.innerHTML='<i class="fas fa-paper-plane"></i> Post';btn.disabled=false;
};

// ── REELS ─────────────────────────────────────────────────────
function renderReels(){
  const panel=document.getElementById('reelsPanel');
  panel.innerHTML=DEMO_REELS.map((r,i)=>`
    <div class="reel" id="reel-${i}">
      <div class="reel-placeholder">
        <div class="rp-icon"><i class="fas fa-film"></i></div>
        <div class="rp-title">Video Reels</div>
        <div class="rp-sub">Post a video from your feed to see it here as a reel. Or connect Supabase to enable full video uploads.</div>
        <div class="rp-box"><b>To enable:</b> Create a Supabase project → bucket: meetup-media → replace YOUR_PROJECT and YOUR_SUPABASE_ANON_KEY in meetup.html</div>
      </div>
      <div class="reel-right">
        <div class="ra ${_liked.has(r.id)?'liked':''}" onclick="lreel('${r.id}',this,${i})">
          <div class="ra-ic"><i class="fas fa-heart"></i></div>
          <span id="rlk-${i}">${r.likes.toLocaleString()}</span>
        </div>
        <div class="ra" onclick="toast('Comments coming soon','info')">
          <div class="ra-ic"><i class="fas fa-comment"></i></div>
          <span>${r.comments}</span>
        </div>
        <div class="ra" onclick="toast('Shared!','success')">
          <div class="ra-ic"><i class="fas fa-share-nodes"></i></div>
          <span>Share</span>
        </div>
        <div class="ra" onclick="openOpts('${r.id}','${r.authorId}')">
          <div class="ra-ic"><i class="fas fa-ellipsis"></i></div>
        </div>
      </div>
      <div class="reel-bottom">
        <div class="reel-user">
          <div class="reel-user-av" style="background:${gr(r.authorId)}">${r.authorName[0]}</div>
          <div class="reel-uname">${r.authorName}</div>
          <button class="reel-follow" onclick="this.textContent=this.textContent==='Follow'?'Following':'Follow'">Follow</button>
        </div>
        <div class="reel-caption">${r.caption}</div>
        <div class="reel-audio"><i class="fas fa-music"></i>${r.audio}</div>
      </div>
    </div>`).join('');
}
window.lreel=(id,el,i)=>{const sp=document.getElementById('rlk-'+i);if(_liked.has(id)){_liked.delete(id);el.classList.remove('liked');sp.textContent=(parseInt(sp.textContent.replace(/,/g,''))-1).toLocaleString();}else{_liked.add(id);el.classList.add('liked');sp.textContent=(parseInt(sp.textContent.replace(/,/g,''))+1).toLocaleString();}};

// ── DMs ───────────────────────────────────────────────────────
function renderDms(){
  const c=document.getElementById('dmsList');
  c.innerHTML=DEMO_DMS.map(d=>`
    <div class="dm-item" onclick="openDmChat(${JSON.stringify(JSON.stringify(d))})">
      <div class="dm-av" style="background:${gr(d.id)}">${d.name[0]}${d.online?'<div class="dm-online"></div>':''}</div>
      <div class="dm-info">
        <div class="dm-name">${d.name}${ptag(d.plan)}</div>
        <div class="dm-last">${d.last}</div>
      </div>
      <div class="dm-right">
        <div class="dm-time">${d.time}</div>
        ${d.unread?`<div class="dm-unread">${d.unread}</div>`:''}
      </div>
    </div>`).join('');
}
window.filterDms=q=>{
  document.querySelectorAll('.dm-item').forEach(el=>{
    el.style.display=el.querySelector('.dm-name').textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
};

window.openDmChat=(dmJson)=>{
  const dm=JSON.parse(dmJson);_dmTarget=dm;
  document.getElementById('dmcAv').style.cssText=`background:${gr(dm.id)};width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:900;color:#fff`;
  document.getElementById('dmcAv').textContent=dm.name[0];
  document.getElementById('dmcName').textContent=dm.name;
  document.getElementById('dmcStatus').textContent=dm.online?'Online':'Offline';
  const msgs=document.getElementById('dmcMsgs');
  msgs.innerHTML='';
  // Load saved history or demo messages
  const hist=_dmHistory[dm.id]||[
    {from:'them',text:`Hey! Saw your post on MeetUp 👋`,time:'Yesterday'},
    {from:'me',text:'Thanks! How\'s your revision going?',time:'Yesterday'},
    {from:'them',text:dm.last,time:dm.time},
  ];
  _dmHistory[dm.id]=hist;
  renderDmMessages(hist);
  document.getElementById('dmChat').classList.add('show');
  msgs.scrollTop=msgs.scrollHeight;
};
window.closeDmChat=()=>document.getElementById('dmChat').classList.remove('show');
function renderDmMessages(hist){
  const msgs=document.getElementById('dmcMsgs');msgs.innerHTML='';
  hist.forEach(m=>{
    if(m.timeSep){const sep=document.createElement('div');sep.className='msg-time-label';sep.textContent=m.timeSep;msgs.appendChild(sep);return;}
    const b=document.createElement('div');b.className=`msg-bubble ${m.from==='me'?'sent':'recv'}`;b.textContent=m.text;msgs.appendChild(b);
  });
  msgs.scrollTop=msgs.scrollHeight;
}
window.sendDm=async()=>{
  const ta=document.getElementById('dmcTa');const text=ta.value.trim();if(!text)return;
  if(!_dmTarget)return;
  const hist=_dmHistory[_dmTarget.id]||[];
  hist.push({from:'me',text});
  _dmHistory[_dmTarget.id]=hist;
  ta.value='';ta.style.height='auto';
  renderDmMessages(hist);
  // AI auto-reply in AI mode
  if(_aiReplyMode){
    setTimeout(async()=>{
      try{
        const r=await fetch('/api/getData',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:text}],model:'fast',systemPrompt:`You are ${_dmTarget.name}, a Nigerian student on Lenovox. Reply naturally in 1-2 sentences like a fellow student chatting.`,uid:_uid||'guest'})});
        const data=await r.json();
        if(data.content){hist.push({from:'them',text:data.content});_dmHistory[_dmTarget.id]=hist;renderDmMessages(hist);}
      }catch{}
    },800);
  }
};
window.aiReplyMode=()=>{
  _aiReplyMode=!_aiReplyMode;
  toast(_aiReplyMode?'AI reply mode ON — AI will simulate responses':'AI reply mode OFF','info');
};
document.getElementById('dmcTa').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px';});
document.getElementById('dmcTa').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendDm();}});

// ── EXPLORE ───────────────────────────────────────────────────
function renderExplore(){
  const tc=document.getElementById('trendsContainer');
  TRENDS.forEach(t=>{const el=document.createElement('div');el.className='trend';el.textContent=t;el.onclick=()=>toast(t+' feed filter coming soon','info');tc.appendChild(el);});
  const sc=document.getElementById('sugContainer');
  SUGGESTED.forEach(u=>{
    const el=document.createElement('div');el.className='sug-item';
    el.innerHTML=`<div class="sug-av" style="background:${gr(u.uid)}">${u.name[0]}</div><div class="sug-info"><div class="sug-name">${u.name}${ptag(u.plan)}</div><div class="sug-bio">${u.bio}</div></div><button class="follow-btn" onclick="this.textContent=this.textContent==='Follow'?'Following':'Follow';this.classList.toggle('following')">Follow</button>`;
    sc.appendChild(el);
  });
}

// ── ONLINE COUNT ANIMATION ────────────────────────────────────
setInterval(()=>{const el=document.getElementById('onlineN');if(el)el.textContent=(1247+Math.floor(Math.random()*40-20)).toLocaleString();},5000);

// ── AUTH ──────────────────────────────────────────────────────
watchAuth(async user=>{
  if(!user)return;
  _uid=user.uid;
  const name=user.displayName||user.email?.split('@')[0]||'Student';
  _uname=name;_uinit=name[0].toUpperCase();
  const av=document.getElementById('composeAv');
  av.textContent=_uinit;av.style.background=gr(_uid);
  try{
    const snap=await getDoc(doc(db,'users',_uid));
    if(snap.exists())_uplan=snap.data().plan||'free';
  }catch{}
  _posts=[...DEMO_POSTS];
  renderPosts([]);
  renderStories();
  renderReels();
  renderDms();
  renderExplore();
  // Real Firestore posts
  try{
    const q=query(collection(db,'posts'),orderBy('createdAt','desc'),limit(20));
    onSnapshot(q,snap=>{
      const real=snap.docs.map(d=>({id:d.id,...d.data()})).filter(p=>!_blocked.has(p.authorId));
      if(real.length){_posts=real;renderPosts([]);}
    });
  }catch{}
});
</script>
