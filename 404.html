<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6229569177818177" crossorigin="anonymous"></script>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png">
<link rel="manifest" href="/manifest.json">

<title>404 — Page Not Found | Lenovox AI</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#03030b;--blue:#00d2ff;--purple:#9d50bb;--gold:#ffcc33;--green:#10b981;--border:rgba(255,255,255,0.09);--text:#e8eaf6;--muted:#8892a4}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100vh;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.univ{position:fixed;inset:0;z-index:-3;background:radial-gradient(circle at 50% 40%,#0d0d2b 0%,#03030b 70%)}
.nebula{position:fixed;inset:0;z-index:-2;background:radial-gradient(circle at 18% 28%,rgba(93,63,211,.5) 0%,transparent 52%),radial-gradient(circle at 82% 68%,rgba(0,210,255,.32) 0%,transparent 52%),radial-gradient(circle at 52% 85%,rgba(157,80,187,.22) 0%,transparent 45%);filter:blur(72px);opacity:.8}
#star-canvas{position:fixed;inset:0;z-index:-1;pointer-events:none}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:rgba(3,3,11,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;text-decoration:none;background:linear-gradient(90deg,#fff 30%,var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:flex;align-items:center;gap:8px}
.nav-dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#ffb347,var(--gold));box-shadow:0 0 14px var(--gold);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.nav-links{display:flex;gap:12px;align-items:center}
.btn-nav{padding:9px 18px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:.84rem;font-weight:700;text-decoration:none;transition:all .25s;display:flex;align-items:center;gap:6px}
.btn-out{background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text)}
.btn-out:hover{background:rgba(255,255,255,.13)}
.btn-sol{background:linear-gradient(135deg,#00d2ff,#3a7bd5);color:#fff;box-shadow:0 6px 20px rgba(0,210,255,.28)}
.btn-sol:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,210,255,.4)}

/* MAIN */
.container{text-align:center;padding:30px 24px;max-width:600px;width:100%}
.code-wrap{position:relative;margin-bottom:24px}
.glitch{font-family:'Orbitron',monospace;font-size:clamp(5rem,20vw,9rem);font-weight:900;line-height:1;color:transparent;-webkit-text-stroke:2px rgba(0,210,255,.6);position:relative;animation:glitchAnim 3s infinite}
.glitch::before,.glitch::after{content:'404';position:absolute;top:0;left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;font-size:clamp(5rem,20vw,9rem);font-weight:900;line-height:1;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.glitch::before{background:linear-gradient(135deg,#00d2ff,#3a7bd5);clip-path:polygon(0 0,100% 0,100% 35%,0 35%);animation:glitchTop 3s infinite;transform:translateX(calc(-50% - 3px))}
.glitch::after{background:linear-gradient(135deg,#9d50bb,#6c3ea6);clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);animation:glitchBot 3s infinite;transform:translateX(calc(-50% + 3px))}
@keyframes glitchTop{0%,90%,100%{clip-path:polygon(0 0,100% 0,100% 35%,0 35%);transform:translateX(calc(-50% - 3px))}92%{transform:translateX(calc(-50% + 6px))}94%{transform:translateX(calc(-50% - 6px))}}
@keyframes glitchBot{0%,90%,100%{clip-path:polygon(0 65%,100% 65%,100% 100%,0 100%);transform:translateX(calc(-50% + 3px))}92%{transform:translateX(calc(-50% - 6px))}94%{transform:translateX(calc(-50% + 6px))}}
@keyframes glitchAnim{0%,88%,100%{-webkit-text-stroke:2px rgba(0,210,255,.6)}90%{-webkit-text-stroke:2px rgba(255,0,100,.7)}92%{-webkit-text-stroke:2px rgba(0,210,255,.6)}}

.orbit{position:relative;width:120px;height:120px;margin:0 auto 28px}
.planet{width:60px;height:60px;background:radial-gradient(circle at 35% 35%,#1a4a6e,#0d0d2b);border-radius:50%;border:2px solid rgba(0,210,255,.4);box-shadow:0 0 30px rgba(0,210,255,.25),inset 0 0 20px rgba(0,0,0,.5);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;font-size:1.6rem}
.ring{position:absolute;inset:-20px;border-radius:50%;border:1.5px solid rgba(0,210,255,.2);animation:spin 8s linear infinite}
.ring2{position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(157,80,187,.2);animation:spin 5s linear infinite reverse}
.astronaut{position:absolute;top:-10px;right:-10px;font-size:1.4rem;animation:float 3s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(15deg)}}

h1{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:700;color:#fff;margin-bottom:12px}
.subtitle{color:var(--muted);font-size:1rem;line-height:1.7;font-weight:600;margin-bottom:32px}
.subtitle span{color:var(--blue);font-weight:700}

.actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:40px}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:13px;background:linear-gradient(135deg,#00d2ff,#3a7bd5);color:#fff;font-weight:700;font-size:.95rem;text-decoration:none;transition:all .3s;box-shadow:0 8px 24px rgba(0,210,255,.3)}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(0,210,255,.45)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:13px;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--text);font-weight:700;font-size:.95rem;text-decoration:none;transition:all .25s}
.btn-secondary:hover{background:rgba(255,255,255,.13);border-color:rgba(0,210,255,.3)}

.quick-links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.ql{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);font-size:.82rem;font-weight:700;text-decoration:none;transition:.25s}
.ql:hover{background:rgba(0,210,255,.1);border-color:rgba(0,210,255,.3);color:var(--blue)}

/* SEARCH */
.search-wrap{margin-bottom:32px}
.search-box{display:flex;gap:10px;max-width:400px;margin:0 auto}
.search-inp{flex:1;padding:12px 18px;background:rgba(255,255,255,.06);border:1.5px solid var(--border);border-radius:12px;color:#fff;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:600;outline:none;transition:.3s}
.search-inp:focus{border-color:rgba(0,210,255,.55);background:rgba(0,210,255,.08)}
.search-inp::placeholder{color:rgba(136,146,164,.5)}
.search-btn{padding:12px 18px;border:none;border-radius:12px;background:linear-gradient(135deg,#00d2ff,#3a7bd5);color:#fff;cursor:pointer;font-size:1rem;transition:.3s}
.search-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,210,255,.3)}
</style>
</head>
<body>
<div class="univ"></div>
<div class="nebula"></div>
<canvas id="star-canvas"></canvas>

<nav>
  <a href="index" class="nav-logo"><div class="nav-dot"></div>LENOVOX</a>
  <div class="nav-links">
    <a href="login" class="btn-nav btn-out"><i class="fas fa-right-to-bracket"></i> Sign In</a>
    <a href="signup" class="btn-nav btn-sol"><i class="fas fa-rocket"></i> Get Started</a>
  </div>
</nav>

<div class="container">
  <div class="code-wrap">
    <div class="glitch">404</div>
  </div>

  <div class="orbit">
    <div class="planet">🌍</div>
    <div class="ring"></div>
    <div class="ring2"></div>
    <div class="astronaut">🧑‍🚀</div>
  </div>

  <h1>Lost in Space</h1>
  <p class="subtitle">The page you're looking for has drifted out of orbit.<br>Maybe it was moved, deleted, or never existed.<br><span>Don't worry — let's get you back on track.</span></p>

  <div class="search-wrap">
    <div class="search-box">
      <input class="search-inp" type="text" id="searchQ" placeholder="Search Lenovox..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()"><i class="fas fa-search"></i></button>
    </div>
  </div>

  <div class="actions">
    <a href="index" class="btn-primary"><i class="fas fa-house"></i> Go Home</a>
    <a href="javascript:history.back()" class="btn-secondary"><i class="fas fa-arrow-left"></i> Go Back</a>
  </div>

  <div class="quick-links">
    <a href="signup" class="ql"><i class="fas fa-rocket"></i> Sign Up Free</a>
    <a href="login" class="ql"><i class="fas fa-right-to-bracket"></i> Login</a>
    <a href="plans" class="ql"><i class="fas fa-crown"></i> Plans</a>
    <a href="blog" class="ql"><i class="fas fa-newspaper"></i> Blog</a>
    <a href="about" class="ql"><i class="fas fa-info-circle"></i> About</a>
    <a href="contact" class="ql"><i class="fas fa-headset"></i> Contact</a>
    <a href="privacy" class="ql"><i class="fas fa-shield-halved"></i> Privacy</a>
    <a href="terms" class="ql"><i class="fas fa-file-contract"></i> Terms</a>
  </div>
</div>

<script>
const sc=document.getElementById('star-canvas'),sx=sc.getContext('2d');let stars=[];
function initStars(){sc.width=innerWidth;sc.height=innerHeight;stars=Array.from({length:150},()=>({x:Math.random()*sc.width,y:Math.random()*sc.height,s:Math.random()*1.8,o:Math.random()*.7+.2,sp:Math.random()*.04+.008}));}
function drawStars(){sx.clearRect(0,0,sc.width,sc.height);stars.forEach(s=>{sx.fillStyle=`rgba(255,255,255,${s.o})`;sx.beginPath();sx.arc(s.x,s.y,s.s,0,Math.PI*2);sx.fill();s.y-=s.sp;if(s.y<0){s.y=sc.height;s.x=Math.random()*sc.width;}});requestAnimationFrame(drawStars);}
window.onresize=initStars;initStars();drawStars();

function doSearch(){
  const q=document.getElementById('searchQ').value.trim();
  if(!q)return;
  window.location.href=`index?q=${encodeURIComponent(q)}`;
}
</script>
</body>
</html>
