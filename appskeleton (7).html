<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Lenovox</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#03030b;
  --nav-bg:rgba(8,8,22,.97);
  --blue:#00d2ff;--gold:#ffcc33;--green:#10b981;
  --border:rgba(255,255,255,.07);
  --nav-h:64px;
  --red:#ef4444;--orange:#ff9500;
}

/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ── ROOT — fixed, full screen, no scroll ── */
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:'Nunito',sans-serif;
  position:fixed;
  top:0;left:0;
}

/* ══════════════════════════════════════════
   MAIN APP SHELL
   layout: [content-window flex:1] + [nav fixed height]
══════════════════════════════════════════ */
#appShell{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  visibility:hidden;
}

/* Content area takes all space above nav */
#contentWindow{
  flex:1;
  position:relative;
  overflow:hidden;
  min-height:0;
}

/* Each section fills content window completely */
.section{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  display:none;
  overflow:hidden;
}
.section.active{display:block;}

/* Iframes fill their section */
.section iframe{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  border:none;
  display:block;
  background:var(--bg);
}

/* Skeleton loader inside each section */
.sk{
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:var(--bg);
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  gap:14px;z-index:5;
  transition:opacity .3s ease;
}
.sk.done{opacity:0;pointer-events:none;}
.sk-logo{
  font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;
  background:linear-gradient(90deg,#fff,var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:skP 1.5s ease-in-out infinite;
}
@keyframes skP{0%,100%{opacity:.4}50%{opacity:1}}
.sk-rings{position:relative;width:40px;height:40px;}
.sk-rings div{
  position:absolute;inset:0;border:3px solid transparent;
  border-radius:50%;animation:skR 1.1s cubic-bezier(.5,0,.5,1) infinite;
}
.sk-rings div:nth-child(1){border-top-color:var(--blue);animation-delay:-.45s}
.sk-rings div:nth-child(2){border-top-color:var(--gold);animation-delay:-.3s}
.sk-rings div:nth-child(3){border-top-color:var(--green);animation-delay:-.15s}
@keyframes skR{
  0%{transform:rotateX(35deg) rotateY(-45deg) rotateZ(0)}
  100%{transform:rotateX(35deg) rotateY(-45deg) rotateZ(360deg)}
}
.sk-status{font-size:.72rem;font-weight:700;color:rgba(255,255,255,.22);letter-spacing:.8px;text-transform:uppercase;margin-top:4px;}

/* ══════════════════════════════════════════
   BOTTOM NAV
══════════════════════════════════════════ */
#bottomNav{
  height:var(--nav-h);
  flex-shrink:0;
  background:var(--nav-bg);
  backdrop-filter:blur(28px);
  -webkit-backdrop-filter:blur(28px);
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid var(--border);
  padding:0 4px;
  padding-bottom:env(safe-area-inset-bottom,0px);
  box-shadow:0 -10px 36px rgba(0,0,0,.55);
  z-index:100;
  transition:opacity .2s ease;
}
.nav-item{
  flex:1;height:100%;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  cursor:pointer;color:rgba(255,255,255,.3);
  transition:all .28s cubic-bezier(.34,1.56,.64,1);
  position:relative;gap:3px;
  -webkit-user-select:none;user-select:none;
  touch-action:manipulation;
}
.nav-icon-wrap{
  width:36px;height:36px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
  transition:all .28s cubic-bezier(.34,1.56,.64,1);
  background:rgba(255,255,255,.04);
}
.nav-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.nav-item.active{color:var(--blue);}
.nav-item.active .nav-icon-wrap{
  transform:translateY(-6px) scale(1.1);
  background:rgba(0,210,255,.14);color:var(--blue);
  box-shadow:0 8px 22px rgba(0,210,255,.22),0 3px 0 rgba(0,210,255,.45);
}
.nav-item.center-btn{flex:0 0 64px;margin-top:-18px;}
.nav-item.center-btn .nav-icon-wrap{
  width:52px;height:52px;border-radius:16px;font-size:21px;
  background:linear-gradient(145deg,#ff5e5e,#ff2d55);color:#fff;
  border:3px solid rgba(8,8,22,1);
  box-shadow:0 8px 18px rgba(255,45,85,.38),0 3px 0 #a80028;
}
.nav-item.center-btn.active .nav-icon-wrap{transform:translateY(1px) scale(.97);}
@media(max-width:380px){
  .nav-label{display:none;}
  .nav-item.center-btn .nav-icon-wrap{width:48px;height:48px;font-size:19px;}
}

/* ══════════════════════════════════════════
   MEETUP FULLSCREEN OVERLAY
   Completely separate from the main shell.
   When active: covers 100% of the screen.
   No nav bar, no shell visible at all.
══════════════════════════════════════════ */
#meetupOverlay{
  /* Hidden by default */
  display:none;
  /* When shown: covers EVERYTHING */
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  z-index:9000;
  background:#03030b;
  flex-direction:column;
  overflow:hidden;
}
#meetupOverlay.show{
  display:flex;
  animation:muIn .25s cubic-bezier(.4,0,.2,1);
}
@keyframes muIn{
  from{transform:translateX(100%);}
  to{transform:translateX(0);}
}
#meetupOverlay.closing{
  animation:muOut .22s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes muOut{
  from{transform:translateX(0);}
  to{transform:translateX(100%);}
}

/* Back bar — the ONLY thing from skeleton visible in MeetUp */
#muBackBar{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 13px 10px;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  background:rgba(3,3,11,.98);
  border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;
  z-index:2;
}
#muBackBtn{
  width:34px;height:34px;
  border-radius:10px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  color:rgba(255,255,255,.8);
  font-size:.85rem;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  flex-shrink:0;
  transition:background .15s,transform .1s;
}
#muBackBtn:active{
  background:rgba(255,255,255,.15);
  transform:scale(.93);
}
#muLogo{
  font-family:'Orbitron',monospace;
  font-size:.9rem;font-weight:900;
  background:linear-gradient(90deg,#8b5cf6,#ff3d70);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  flex:1;
}

/* The MeetUp iframe — fills ALL space below back bar */
#meetupFrame{
  flex:1;
  width:100%;
  /* Let flex handle the height — no explicit height needed */
  min-height:0;
  border:none;
  display:block;
  background:#03030b;
  overflow:hidden;
}

/* ══════════════════════════════════════════
   AUTH GUARD
══════════════════════════════════════════ */
#authGuard{
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:99999;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  transition:opacity .4s ease;
}
.guard-logo{
  font-family:'Orbitron',monospace;font-size:1.9rem;font-weight:900;
  background:linear-gradient(90deg,#fff,var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;display:flex;align-items:center;gap:10px;
}
.guard-dot{
  width:13px;height:13px;border-radius:50%;
  background:var(--gold);box-shadow:0 0 18px var(--gold);
  animation:gdot 1.5s ease-in-out infinite;
}
@keyframes gdot{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
.guard-rings{position:relative;width:38px;height:38px;}
.guard-rings div{
  position:absolute;inset:0;border:2.5px solid transparent;
  border-radius:50%;animation:skR .9s cubic-bezier(.5,0,.5,1) infinite;
}
.guard-rings div:nth-child(1){border-top-color:var(--blue);animation-delay:-.4s}
.guard-rings div:nth-child(2){border-top-color:var(--gold);animation-delay:-.27s}
.guard-rings div:nth-child(3){border-top-color:var(--green);animation-delay:-.13s}
.guard-text{
  font-size:.74rem;font-weight:700;
  color:rgba(255,255,255,.28);
  letter-spacing:1px;text-transform:uppercase;
}

/* ══════════════════════════════════════════
   NO INTERNET OVERLAY
══════════════════════════════════════════ */
#noNet{
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:99998;
  background:rgba(3,3,11,.96);backdrop-filter:blur(12px);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  gap:14px;text-align:center;padding:28px;
}
#noNet.show{display:flex;}
.no-net-icon{
  width:72px;height:72px;border-radius:22px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;color:var(--red);margin-bottom:4px;
}
.no-net-title{
  font-family:'Orbitron',monospace;font-size:1rem;font-weight:900;
  color:#fff;margin-bottom:4px;
}
.no-net-sub{font-size:.8rem;color:rgba(255,255,255,.4);line-height:1.65;max-width:260px;}
.no-net-retry{
  display:flex;align-items:center;gap:7px;
  padding:12px 22px;border:none;border-radius:12px;
  background:linear-gradient(135deg,var(--blue),#0077b6);
  color:#fff;font-family:'Nunito',sans-serif;font-size:.86rem;font-weight:800;
  cursor:pointer;margin-top:4px;touch-action:manipulation;
}

/* ══════════════════════════════════════════
   NETWORK BADGE
══════════════════════════════════════════ */
#netBadge{
  position:fixed;top:10px;right:10px;z-index:9997;
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:999px;
  font-size:.65rem;font-weight:800;
  backdrop-filter:blur(10px);
  transition:opacity .4s ease;opacity:0;pointer-events:none;
  border:1px solid;
}
#netBadge.show{opacity:1;}
#netBadge.fast{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.25);color:#6ee7b7;}
#netBadge.medium{background:rgba(255,204,51,.1);border-color:rgba(255,204,51,.22);color:var(--gold);}
#netBadge.slow{background:rgba(255,149,0,.1);border-color:rgba(255,149,0,.22);color:var(--orange);}
#netBadge.offline{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.25);color:#fca5a5;}

/* ══════════════════════════════════════════
   PARTICLE TRANSITION CANVAS
══════════════════════════════════════════ */
#transitionCanvas{
  position:fixed;top:0;left:0;right:0;bottom:0;
  z-index:8999;pointer-events:none;opacity:0;
  transition:opacity .1s ease;
}
#transitionCanvas.show{opacity:1;pointer-events:all;}

/* ══════════════════════════════════════════
   PLEASE WAIT BAR
══════════════════════════════════════════ */
#waitBar{
  position:fixed;
  bottom:calc(var(--nav-h) + 12px);
  left:50%;transform:translateX(-50%);
  z-index:9998;
  background:rgba(8,8,22,.95);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.1);border-radius:999px;
  padding:8px 16px;display:flex;align-items:center;gap:8px;
  font-size:.75rem;font-weight:700;color:rgba(255,255,255,.7);
  opacity:0;pointer-events:none;
  transition:opacity .3s ease;white-space:nowrap;
}
#waitBar.show{opacity:1;}
.wait-spin{
  width:12px;height:12px;
  border:2px solid rgba(255,255,255,.15);
  border-top-color:var(--blue);border-radius:50%;
  animation:spin .65s linear infinite;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- PARTICLE CANVAS -->
<canvas id="transitionCanvas"></canvas>

<!-- AUTH GUARD — shown while checking login -->
<div id="authGuard">
  <div class="guard-logo"><div class="guard-dot"></div>LENOVOX</div>
  <div class="guard-rings"><div></div><div></div><div></div></div>
  <div class="guard-text" id="guardText">Loading Your Universe...</div>
</div>

<!-- NO INTERNET -->
<div id="noNet">
  <div class="no-net-icon"><i class="fas fa-wifi-slash"></i></div>
  <div class="no-net-title">No Internet</div>
  <div class="no-net-sub">Check your connection and try again.</div>
  <button class="no-net-retry" id="retryBtn"><i class="fas fa-rotate-right"></i> Retry</button>
</div>

<!-- NETWORK BADGE -->
<div id="netBadge">
  <i class="fas fa-signal" id="netIcon"></i>
  <span id="netLabel">Checking...</span>
</div>

<!-- PLEASE WAIT -->
<div id="waitBar">
  <div class="wait-spin"></div>
  <span id="waitMsg">Please wait...</span>
</div>

<!-- ════════════════════════════════════════
     MEETUP FULLSCREEN OVERLAY
     Completely separate from appShell.
     Covers 100% phone screen when active.
════════════════════════════════════════ -->
<div id="meetupOverlay">
  <div id="muBackBar">
    <button id="muBackBtn"><i class="fas fa-arrow-left"></i></button>
    <div id="muLogo">MeetUp</div>
  </div>
  <iframe id="meetupFrame" src="" allow="camera;microphone" allowfullscreen></iframe>
</div>

<!-- ════════════════════════════════════════
     MAIN APP SHELL
     Hidden when MeetUp is open.
════════════════════════════════════════ -->
<div id="appShell" style="visibility:hidden">

  <div id="contentWindow">

    <!-- DASHBOARD -->
    <div class="section active" id="sec-dashboard">
      <div class="sk" id="sk-dashboard">
        <div class="sk-logo">LENOVOX</div>
        <div class="sk-rings"><div></div><div></div><div></div></div>
        <div class="sk-status">Loading Dashboard...</div>
      </div>
      <iframe src="userdashboard.html"
        onload="hideLoader('sk-dashboard')"
        allow="camera;microphone">
      </iframe>
    </div>

    <!-- AI -->
    <div class="section" id="sec-ai">
      <div class="sk" id="sk-ai">
        <div class="sk-logo">LENOVOX</div>
        <div class="sk-rings"><div></div><div></div><div></div></div>
        <div class="sk-status">Loading AI Assistant...</div>
      </div>
      <iframe src="ai-chat-bot-assitant.html"
        loading="lazy"
        onload="hideLoader('sk-ai')"
        allow="camera;microphone">
      </iframe>
    </div>

    <!-- GAMING -->
    <div class="section" id="sec-gaming">
      <div class="sk" id="sk-gaming">
        <div class="sk-logo">LENOVOX</div>
        <div class="sk-rings"><div></div><div></div><div></div></div>
        <div class="sk-status">Loading Games...</div>
      </div>
      <iframe src="gaming-section.html"
        loading="lazy"
        onload="hideLoader('sk-gaming')">
      </iframe>
    </div>

    <!-- SETTINGS -->
    <div class="section" id="sec-settings">
      <div class="sk" id="sk-settings">
        <div class="sk-logo">LENOVOX</div>
        <div class="sk-rings"><div></div><div></div><div></div></div>
        <div class="sk-status">Loading Settings...</div>
      </div>
      <iframe src="lenovox-settings.html"
        loading="lazy"
        onload="hideLoader('sk-settings')">
      </iframe>
    </div>

  </div><!-- end contentWindow -->

  <!-- BOTTOM NAV -->
  <nav id="bottomNav">
    <div class="nav-item active" data-sec="dashboard">
      <div class="nav-icon-wrap"><i class="fas fa-house"></i></div>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item" data-sec="ai">
      <div class="nav-icon-wrap"><i class="fas fa-robot"></i></div>
      <span class="nav-label">AI</span>
    </div>
    <div class="nav-item center-btn" data-sec="gaming">
      <div class="nav-icon-wrap"><i class="fas fa-gamepad"></i></div>
    </div>
    <div class="nav-item" id="meetupNavBtn">
      <div class="nav-icon-wrap"><i class="fas fa-earth-africa"></i></div>
      <span class="nav-label">MeetUp</span>
    </div>
    <div class="nav-item" data-sec="settings">
      <div class="nav-icon-wrap"><i class="fas fa-sliders"></i></div>
      <span class="nav-label">More</span>
    </div>
  </nav>

</div><!-- end appShell -->

<script type="module">
import { watchAuth } from './auth.js';

// ── ELEMENTS ───────────────────────────────────────────────────
const authGuard  = document.getElementById('authGuard');
const appShell   = document.getElementById('appShell');
const noNet      = document.getElementById('noNet');
const netBadge   = document.getElementById('netBadge');
const waitBar    = document.getElementById('waitBar');
const meetupOv   = document.getElementById('meetupOverlay');
const meetupFr   = document.getElementById('meetupFrame');
const muBackBtn  = document.getElementById('muBackBtn');

// ── STATE ──────────────────────────────────────────────────────
let _current     = 'dashboard';
let _navHistory  = ['dashboard'];
let _meetupOpen  = false;
let _meetupLoaded = false;
const _loaded    = new Set(['dashboard']);

// ── AUTH ──────────────────────────────────────────────────────
watchAuth(user => {
  if (!user) { window.location.replace('login'); return; }
  document.getElementById('guardText').textContent = 'Welcome back!';
  setTimeout(() => {
    authGuard.style.opacity = '0';
    setTimeout(() => {
      authGuard.style.display = 'none';
      appShell.style.visibility = 'visible';
    }, 420);
  }, 350);
});

// ── SKELETON HIDE ──────────────────────────────────────────────
window.hideLoader = id => {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('done');
  setTimeout(() => { if (el.parentNode) el.style.display = 'none'; }, 380);
};

// ── NETWORK ────────────────────────────────────────────────────
function updateNetBadge(cls, label, icon) {
  netBadge.className = 'show ' + cls;
  document.getElementById('netIcon').className = 'fas ' + icon;
  document.getElementById('netLabel').textContent = label;
  if (cls !== 'offline') {
    clearTimeout(window._nbTimer);
    window._nbTimer = setTimeout(() => netBadge.classList.remove('show'), 4000);
  }
}
function checkNet() {
  if (!navigator.onLine) {
    updateNetBadge('offline', 'No Internet', 'fa-wifi-slash');
    noNet.classList.add('show'); return;
  }
  noNet.classList.remove('show');
  const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (!c) return;
  const t = c.effectiveType;
  if (t === '4g')          updateNetBadge('fast',   '4G — Fast',     'fa-signal');
  else if (t === '3g')     updateNetBadge('medium', '3G — Medium',   'fa-signal');
  else                     updateNetBadge('slow',   'Slow Network',  'fa-signal-weak');
}
window.addEventListener('online',  () => { noNet.classList.remove('show'); checkNet(); });
window.addEventListener('offline', () => { updateNetBadge('offline','No Internet','fa-wifi-slash'); noNet.classList.add('show'); });
const _c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
if (_c) _c.addEventListener('change', checkNet);
setTimeout(checkNet, 1000);

document.getElementById('retryBtn').addEventListener('click', () => {
  if (navigator.onLine) { noNet.classList.remove('show'); checkNet(); }
  else {
    document.getElementById('retryBtn').innerHTML = '<i class="fas fa-rotate-right"></i> Still offline...';
    setTimeout(() => { document.getElementById('retryBtn').innerHTML = '<i class="fas fa-rotate-right"></i> Retry'; }, 2000);
  }
});

// ── PLEASE WAIT ────────────────────────────────────────────────
function showWait(msg) {
  document.getElementById('waitMsg').textContent = msg || 'Please wait...';
  waitBar.classList.add('show');
}
function hideWait() { waitBar.classList.remove('show'); }

// ── PARTICLE TRANSITION ────────────────────────────────────────
const canvas = document.getElementById('transitionCanvas');
const ctx    = canvas.getContext('2d');
let _pts = [], _raf = null;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const SEC_COLORS = {
  dashboard: ['#00d2ff','#ffcc33'],
  ai:        ['#3b82f6','#8b5cf6'],
  gaming:    ['#ff2d55','#ff9500'],
  meetup:    ['#8b5cf6','#ff3d70'],
  settings:  ['#10b981','#00d2ff'],
};

function mkParticles(c1, c2) {
  _pts = [];
  for (let i = 0; i < 140; i++) {
    _pts.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      sz: Math.random() * 5 + 2,
      vx: (Math.random() - .5) * 6,
      vy: (Math.random() - .5) * 6,
      op: 1,
      col: Math.random() > .5 ? c1 : c2,
      rot: Math.random() * Math.PI * 2,
      rs: (Math.random() - .5) * .2,
      sh: Math.floor(Math.random() * 3),
    });
  }
}

function drawPt(p) {
  ctx.save();
  ctx.globalAlpha = p.op;
  ctx.fillStyle   = p.col;
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  if (p.sh === 0) {
    ctx.beginPath(); ctx.arc(0, 0, p.sz, 0, Math.PI*2); ctx.fill();
  } else if (p.sh === 1) {
    ctx.fillRect(-p.sz/2, -p.sz/2, p.sz, p.sz);
  } else {
    ctx.beginPath(); ctx.moveTo(0,-p.sz); ctx.lineTo(p.sz,p.sz); ctx.lineTo(-p.sz,p.sz); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function animPts(phase, t0, dur, done) {
  cancelAnimationFrame(_raf);
  (function frame() {
    const prog = Math.min((Date.now() - t0) / dur, 1);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    _pts.forEach(p => {
      if (phase === 'out') {
        p.x  += p.vx * (1 + prog * 3);
        p.y  += p.vy * (1 + prog * 3);
        p.op  = 1 - prog;
        p.sz *= .99;
      } else {
        p.x  += (canvas.width  / 2 - p.x) * .04 * prog;
        p.y  += (canvas.height / 2 - p.y) * .04 * prog;
        p.op  = prog;
      }
      p.rot += p.rs;
      drawPt(p);
    });
    if (prog < 1) { _raf = requestAnimationFrame(frame); }
    else if (done) done();
  })();
}

function runTransition(from, to, onMid) {
  const [c1, c2] = SEC_COLORS[to] || ['#00d2ff','#8b5cf6'];
  mkParticles(c1, c2);
  canvas.classList.add('show');
  animPts('out', Date.now(), 260, () => {
    if (onMid) onMid();
    mkParticles(c1, c2);
    _pts.forEach(p => {
      p.x  = canvas.width  / 2 + (Math.random() - .5) * 60;
      p.y  = canvas.height / 2 + (Math.random() - .5) * 60;
      p.op = 0;
    });
    animPts('in', Date.now(), 280, () => {
      canvas.classList.remove('show');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });
  });
}

// ── MEETUP OPEN / CLOSE ────────────────────────────────────────
function openMeetup() {
  if (_meetupOpen) return;
  _meetupOpen = true;

  // Mark meetup nav item active
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('meetupNavBtn').classList.add('active');

  // Run particle transition, then slide in overlay
  runTransition(_current, 'meetup', () => {
    // Load iframe if first time
    if (!_meetupLoaded) {
      meetupFr.src = 'meetup.html';
      _meetupLoaded = true;
    }
    // Show the fullscreen overlay
    appShell.style.visibility = 'hidden';
    meetupOv.classList.add('show');
  });

  if (navigator.vibrate) navigator.vibrate(8);
}

function closeMeetup() {
  if (!_meetupOpen) return;
  _meetupOpen = false;

  meetupOv.classList.add('closing');

  setTimeout(() => {
    meetupOv.classList.remove('show', 'closing');
    appShell.style.visibility = 'visible';

    // Restore previous section active state
    document.querySelectorAll('.nav-item').forEach(n =>
      n.classList.toggle('active', n.dataset.sec === _current)
    );

    // Run particle transition back
    const [c1, c2] = SEC_COLORS[_current] || ['#00d2ff','#8b5cf6'];
    mkParticles(c1, c2);
    canvas.classList.add('show');
    _pts.forEach(p => { p.x = canvas.width/2 + (Math.random()-.5)*60; p.y = canvas.height/2 + (Math.random()-.5)*60; p.op = 0; });
    animPts('in', Date.now(), 280, () => {
      canvas.classList.remove('show');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });
  }, 220);

  if (navigator.vibrate) navigator.vibrate(8);
}

// Back button in MeetUp back bar
muBackBtn.addEventListener('click', closeMeetup);

// MeetUp nav button
document.getElementById('meetupNavBtn').addEventListener('click', openMeetup);

// Expose to iframe so meetup.html can call window.parent.closeMeetup()
window.closeMeetup = closeMeetup;
// Also keep goBack working — MeetUp calls window.parent.goBack()
window.goBack = () => {
  if (_meetupOpen) { closeMeetup(); return; }
  if (_navHistory.length > 1) {
    _navHistory.pop();
    navigateTo(_navHistory[_navHistory.length - 1], { isBack: true });
  } else {
    navigateTo('dashboard', { isBack: true });
  }
};

// ── NORMAL SECTION NAVIGATION ──────────────────────────────────
window.navigateTo = (name, opts = {}) => {
  // MeetUp is handled separately
  if (name === 'meetup') { openMeetup(); return; }
  if (!navigator.onLine) { showWait('No internet. Check your connection.'); setTimeout(hideWait, 2500); return; }
  if (name === _current && !opts.isBack) return;

  const el = document.getElementById('sec-' + name);
  if (!el) return;

  const wasLoaded = _loaded.has(name);
  if (!wasLoaded) showWait('Loading ' + name.charAt(0).toUpperCase() + name.slice(1) + '...');

  if (!opts.isBack) {
    if (_navHistory[_navHistory.length - 1] !== name) _navHistory.push(name);
  }
  const prev = _current;
  _current = name;
  _loaded.add(name);

  document.querySelectorAll('.nav-item[data-sec]').forEach(n =>
    n.classList.toggle('active', n.dataset.sec === name)
  );

  runTransition(prev, name, () => {
    document.querySelectorAll('.section').forEach(s => {
      const hit = s.id === 'sec-' + name;
      if (hit) {
        s.classList.add('active');
        if (!wasLoaded) setTimeout(hideWait, 500);
      } else {
        s.classList.remove('active');
      }
    });
    pushTheme();
  });

  if (navigator.vibrate) navigator.vibrate(8);
};

// ── ANDROID HARDWARE BACK BUTTON ───────────────────────────────
history.pushState({ p: 'dashboard' }, '');
window.addEventListener('popstate', () => {
  history.pushState({ p: _current }, '');
  if (_meetupOpen) { closeMeetup(); return; }
  if (_navHistory.length > 1) {
    _navHistory.pop();
    const prev = _navHistory[_navHistory.length - 1];
    _current = prev;
    document.querySelectorAll('.nav-item[data-sec]').forEach(n =>
      n.classList.toggle('active', n.dataset.sec === prev)
    );
    document.querySelectorAll('.section').forEach(s => {
      s.classList.toggle('active', s.id === 'sec-' + prev);
    });
    pushTheme();
  }
});

// ── NORMAL NAV CLICKS ──────────────────────────────────────────
document.querySelectorAll('.nav-item[data-sec]').forEach(item => {
  item.addEventListener('click', () => navigateTo(item.dataset.sec));
});

// ── THEME ──────────────────────────────────────────────────────
function pushTheme() {
  const t    = localStorage.getItem('lenovox_theme') || '';
  const attr = t === 'light' ? 'light' : t === 'dim' ? 'dim' : '';
  document.querySelectorAll('iframe').forEach(f => {
    try { f.contentDocument?.documentElement?.setAttribute('data-theme', attr); } catch {}
  });
}
window.addEventListener('storage', e => { if (e.key === 'lenovox_theme') pushTheme(); });

// ── INIT ───────────────────────────────────────────────────────
// Make sure dashboard section is visible
document.getElementById('sec-dashboard').classList.add('active');
</script>
