<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Offline — Lenovox AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#03030b;color:#e8eaf6;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;text-align:center;padding:24px}
.icon{font-size:3rem;margin-bottom:16px;opacity:.4}
h1{font-size:1.1rem;font-weight:800;margin-bottom:8px}
p{font-size:.82rem;color:#8892a4;line-height:1.7;margin-bottom:20px}
button{padding:12px 24px;border:none;border-radius:12px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;font-family:inherit;font-size:.88rem;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<div>
  <div class="icon">📡</div>
  <h1>You are offline</h1>
  <p>Lenovox AI needs an internet connection to work. Please check your connection and try again.</p>
  <button onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
